<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Level Up | Görev Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --absolute-bg: #0d1117;
            --absolute-card: #161b22;
            --absolute-border: #30363d;
            --absolute-blue: #6366f1;
            --absolute-text: #c9d1d9;
        }

        body { background-color: var(--absolute-bg); color: var(--absolute-text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        .glass-panel { background: var(--absolute-card); border: 1px solid var(--absolute-border); border-radius: 12px; padding: 30px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* XP Bar Tasarımı */
        .xp-bar { background: #21262d; height: 14px; border-radius: 10px; margin: 20px 0; overflow: hidden; border: 1px solid var(--absolute-border); position: relative; }
        #xp-fill { background: linear-gradient(90deg, var(--absolute-blue), #818cf8); width: 0%; height: 100%; transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        .quest-item { background: #0d1117; border: 1px solid var(--absolute-border); padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--absolute-border); color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--absolute-blue); }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--absolute-blue); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-finish { width: auto; padding: 6px 12px; font-size: 0.75rem; background: #238636; }
        
        #loading-screen { text-align: center; }
        .hidden { display: none !important; }
        .status-msg { color: #8b949e; font-size: 0.85rem; margin-top: 15px; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="font-size: 1.8rem; font-weight: 800; letter-spacing: -1px;">ABSOLUTE <span style="color:var(--absolute-blue)">LEVEL</span></div>
    <p id="loading-text">Veritabanına bağlanılıyor...</p>
</div>

<div id="main-content" class="hidden">
    <div class="glass-panel">
        <h2 id="user-name" style="margin:0; color:white; font-weight: 800;">KARAKTER</h2>
        <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:0.85rem; font-weight: 600;">
            <span id="level-label">Seviye 1</span>
            <span id="xp-label">0% XP</span>
        </div>
        <div class="xp-bar"><div id="xp-fill"></div></div>

        <div id="quest-list" style="text-align: left; margin-top: 25px; max-height: 250px; overflow-y: auto;">
            </div>

        <div style="margin-top:25px; padding-top: 20px; border-top: 1px solid var(--absolute-border);">
            <input type="text" id="quest-input" placeholder="Yeni bir görev tanımla...">
            <button onclick="addNewQuest()">GÖREVİ LİSTEYE EKLE</button>
        </div>
        
        <button onclick="location.href='https://kuzeymurt00-blip.github.io/Website/'" style="background:none; color:#8b949e; font-size:0.8rem; margin-top:15px; border:1px solid #30363d; height: 35px; padding: 0;">Siteden Çıkış Yap</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC29HXKSTcXx5-BuLrt6h8iH4BUh3jnNes",
        authDomain: "absolutebisite.firebaseapp.com",
        projectId: "absolutebisite",
        storageBucket: "absolutebisite.firebasestorage.app",
        messagingSenderId: "648450986989",
        appId: "1:648450986989:web:17ff5e9a4ffd1577354de4",
        measurementId: "G-EXPBEZ198Z"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            try {
                // 1. Kullanıcı adını 'all_users' koleksiyonundan oku
                const nameDoc = await getDoc(doc(db, "all_users", user.uid));
                const username = nameDoc.exists() ? nameDoc.data().username : user.email.split('@')[0];
                document.getElementById('user-name').innerText = username.toUpperCase();

                // 2. XP ve Görevleri yeni 'user_stats' koleksiyonundan takip et
                const statsRef = doc(db, "user_stats", user.uid);
                
                onSnapshot(statsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        renderUI(docSnap.data());
                    } else {
                        // Eğer bu kullanıcı için 'user_stats' dökümanı yoksa oluştur
                        setDoc(statsRef, { level: 1, xp: 0, quests: [], email: user.email });
                    }
                    // Yükleme ekranını kapat
                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                });

            } catch (err) {
                document.getElementById('loading-text').innerText = "Hata: " + err.message;
            }
        } else {
            window.location.href = "https://kuzeymurt00-blip.github.io/Website/";
        }
    });

    function renderUI(data) {
        const lvl = data.level || 1;
        const xp = data.xp || 0;
        document.getElementById('level-label').innerText = "Seviye " + lvl;
        document.getElementById('xp-label').innerText = xp + "% XP";
        document.getElementById('xp-fill').style.width = xp + "%";
        
        const list = document.getElementById('quest-list');
        list.innerHTML = "";
        const quests = data.quests || [];
        
        if(quests.length === 0) {
            list.innerHTML = "<p style='color:gray; text-align:center; font-size:0.8rem;'>Şu an aktif bir görevin yok.</p>";
        }

        quests.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'quest-item';
            div.innerHTML = `<span>${q}</span> <button class="btn-finish" onclick="finishQuest('${q}')">BİTİR</button>`;
            list.appendChild(div);
        });
    }

    // YENİ GÖREV EKLEME
    window.addNewQuest = async () => {
        const input = document.getElementById('quest-input');
        if(!input.value) return;
        const ref = doc(db, "user_stats", auth.currentUser.uid);
        await updateDoc(ref, {
            quests: arrayUnion(input.value)
        });
        input.value = "";
    };

    // GÖREV BİTİRME VE XP KAZANMA
    window.finishQuest = async (questText) => {
        const ref = doc(db, "user_stats", auth.currentUser.uid);
        const snap = await getDoc(ref);
        const data = snap.data();
        
        let newXP = (data.xp || 0) + 20; // Her görev 20 XP verir
        let newLevel = data.level || 1;

        if(newXP >= 100) {
            newXP = 0;
            newLevel++;
            alert("TEBRİKLER! Seviye Atladın: " + newLevel);
        }

        await updateDoc(ref, {
            quests: arrayRemove(questText),
            xp: newXP,
            level: newLevel
        });
    };
</script>
</body>
</html>
