<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute System | Global Görevler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #6366f1; --text: #c9d1d9; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        .glass-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; width: 90%; max-width: 450px; text-align: center; }
        .xp-bar { background: #21262d; height: 14px; border-radius: 10px; margin: 20px 0; overflow: hidden; border: 1px solid var(--border); }
        #xp-fill { background: linear-gradient(90deg, var(--blue), #818cf8); width: 0%; height: 100%; transition: 1.5s ease; }
        .quest-item { background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .admin-panel { margin-top: 20px; padding: 15px; border: 1px dashed var(--blue); border-radius: 10px; background: rgba(99, 102, 241, 0.05); }
        input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #30363d; opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="main-content">
    <div class="glass-panel">
        <h2 id="user-name" style="margin:0; color:white;">YÜKLENİYOR...</h2>
        <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:0.85rem;">
            <span id="level-label">Seviye 1</span>
            <span id="xp-label">0% XP</span>
        </div>
        <div class="xp-bar"><div id="xp-fill"></div></div>

        <div id="quest-list" style="text-align: left; margin-top: 25px;"></div>

        <div id="admin-area" class="hidden admin-panel">
            <h4 style="margin:0 0 10px 0; color:var(--blue);">👑 GLOBAL ADMIN PANELİ</h4>
            <input type="text" id="quest-input" placeholder="TÜM OYUNCULARA GİDECEK GÖREV...">
            <button onclick="publishGlobalQuest()">HERKESE YAYINLA</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC29HXKSTcXx5-BuLrt6h8iH4BUh3jnNes",
        authDomain: "absolutebisite.firebaseapp.com",
        projectId: "absolutebisite",
        storageBucket: "absolutebisite.firebasestorage.app",
        messagingSenderId: "648450986989",
        appId: "1:648450986989:web:17ff5e9a4ffd1577354de4",
        measurementId: "G-EXPBEZ198Z"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userStats = {};

    onAuthStateChanged(auth, async (user) => {
        if (!user) return;

        // Admin Kontrolü
        const adminDoc = await getDoc(doc(db, "admins", user.email));
        if (adminDoc.exists() || user.email === "kuzeymurt00@gmail.com") {
            document.getElementById('admin-area').classList.remove('hidden');
        }

        // Kullanıcı Adı
        const nameDoc = await getDoc(doc(db, "all_users", user.uid));
        document.getElementById('user-name').innerText = (nameDoc.exists() ? nameDoc.data().username : "OYUNCU").toUpperCase();

        // Kişisel İstatistikleri Takip Et
        onSnapshot(doc(db, "user_stats", user.uid), (snap) => {
            if (snap.exists()) {
                userStats = snap.data();
                renderUI();
            } else {
                setDoc(doc(db, "user_stats", user.uid), { level: 1, xp: 0, completedGlobal: [], lastFinish: 0 });
            }
        });

        // GLOBAL GÖREVLERİ TAKİP ET (Sihirli kısım burası!)
        onSnapshot(doc(db, "global_settings", "quests"), (snap) => {
            if (snap.exists()) renderUI(snap.data().list);
        });
    });

    async function renderUI(globalQuests = []) {
        document.getElementById('level-label').innerText = "Seviye " + (userStats.level || 1);
        document.getElementById('xp-label').innerText = (userStats.xp || 0) + "% XP";
        document.getElementById('xp-fill').style.width = (userStats.xp || 0) + "%";
        
        const list = document.getElementById('quest-list');
        list.innerHTML = "";

        // Global görevleri listele
        const qList = globalQuests.length > 0 ? globalQuests : (await getDoc(doc(db, "global_settings", "quests")))?.data()?.list || [];
        
        const now = Date.now();
        const cooldownActive = (now - (userStats.lastFinish || 0)) < (24 * 60 * 60 * 1000);

        qList.forEach(q => {
            const isDone = (userStats.completedGlobal || []).includes(q);
            const div = document.createElement('div');
            div.className = 'quest-item';
            div.innerHTML = `
                <span style="${isDone ? 'text-decoration: line-through; color:gray;' : ''}">${q}</span>
                <button onclick="completeGlobal('${q}')" ${isDone || cooldownActive ? 'disabled' : ''}>
                    ${isDone ? 'BİTTİ' : (cooldownActive ? 'BEKLE' : 'BİTİR')}
                </button>
            `;
            list.appendChild(div);
        });
    }

    // ADMIN: HERKESE GÖREV YAYINLA
    window.publishGlobalQuest = async () => {
        const text = document.getElementById('quest-input').value;
        if (!text) return;
        const ref = doc(db, "global_settings", "quests");
        
        // Eğer döküman yoksa oluştur, varsa listeye ekle
        const snap = await getDoc(ref);
        if (!snap.exists()) {
            await setDoc(ref, { list: [text] });
        } else {
            await updateDoc(ref, { list: arrayUnion(text) });
        }
        alert("Görev tüm dünyaya duyuruldu! 🌍");
        document.getElementById('quest-input').value = "";
    };

    // KULLANICI: GLOBAL GÖREVİ BİTİR
    window.completeGlobal = async (qName) => {
        const ref = doc(db, "user_stats", auth.currentUser.uid);
        let newXP = (userStats.xp || 0) + 20;
        let newLvl = userStats.level || 1;
        if (newXP >= 100) { newXP = 0; newLvl++; }

        await updateDoc(ref, {
            completedGlobal: arrayUnion(qName),
            xp: newXP,
            level: newLvl,
            lastFinish: Date.now()
        });
    }
</script>
</body>
</html>
