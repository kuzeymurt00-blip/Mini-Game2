<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Level Up | Görev Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --absolute-bg: #0d1117;
            --absolute-card: #161b22;
            --absolute-border: #30363d;
            --absolute-blue: #6366f1;
            --absolute-text: #c9d1d9;
            --absolute-gold: #d29922;
        }

        body { background-color: var(--absolute-bg); color: var(--absolute-text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Dashboard Kartı */
        .glass-panel { background: var(--absolute-card); border: 1px solid var(--absolute-border); border-radius: 12px; padding: 30px; width: 90%; max-width: 500px; margin-top: 40px; }
        
        /* XP Bar */
        .xp-container { background: #21262d; height: 15px; border-radius: 10px; margin: 20px 0; overflow: hidden; border: 1px solid var(--absolute-border); }
        #xp-fill { background: linear-gradient(90deg, var(--absolute-blue), #a855f7); width: 0%; height: 100%; transition: 1s ease; }

        /* Görev Listesi */
        .quest-item { background: #0d1117; border: 1px solid var(--absolute-border); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        button { cursor: pointer; border-radius: 8px; border: 1px solid var(--absolute-border); padding: 10px 20px; font-weight: 600; font-family: inherit; transition: 0.2s; }
        .btn-primary { background: var(--absolute-blue); color: white; border: none; }
        .btn-primary:hover { opacity: 0.8; }
        
        .hidden { display: none !important; }
        #loading-screen { margin-top: 100px; font-size: 1.2rem; color: var(--absolute-blue); }
    </style>
</head>
<body>

<div id="loading-screen">Sistem Senkronize Ediliyor...</div>

<div id="main-content" class="hidden">
    <div class="glass-panel">
        <h2 style="margin-top:0;">⚔️ <span id="display-name" style="color:var(--absolute-blue)">Karakter</span></h2>
        <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
            <span>Seviye: <b id="lvl-text">1</b></span>
            <span>XP: <b id="xp-text">0/100</b></span>
        </div>
        <div class="xp-container">
            <div id="xp-fill"></div>
        </div>

        <h3 style="border-bottom: 1px solid var(--absolute-border); padding-bottom: 10px;">Aktif Görevler</h3>
        <div id="quest-list">
            </div>

        <div style="margin-top:20px;">
            <input type="text" id="quest-input" style="width:100%; padding:10px; background:#0d1117; border:1px solid var(--absolute-border); color:white; border-radius:8px;" placeholder="Yeni görev yaz...">
            <button onclick="addQuest()" class="btn-primary" style="width:100%; margin-top:10px;">GÖREV EKLE</button>
        </div>

        <button onclick="location.href='https://kuzeymurt00-blip.github.io/Website/'" style="width:100%; margin-top:20px; background:transparent; color:gray;">Ana Sayfaya Dön</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC29HXKSTcXx5-BuLrt6h8iH4BUh3jnNes",
        authDomain: "absolutebisite.firebaseapp.com",
        projectId: "absolutebisite",
        storageBucket: "absolutebisite.firebasestorage.app",
        messagingSenderId: "648450986989",
        appId: "1:648450986989:web:17ff5e9a4ffd1577354de4",
        measurementId: "G-EXPBEZ198Z"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userUID = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userUID = user.uid;
            // Emoji Hub'daki gibi all_users'dan isim çekiyoruz
            const userDoc = await getDoc(doc(db, "all_users", user.uid));
            const username = userDoc.exists() ? userDoc.data().username : user.email.split('@')[0];
            document.getElementById('display-name').innerText = username.toUpperCase();

            // Görev verilerini "user_stats" koleksiyonunda tutalım (Karışmasın diye)
            loadStats(user.uid);
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        } else {
            window.location.href = "https://kuzeymurt00-blip.github.io/Website/";
        }
    });

    function loadStats(uid) {
        onSnapshot(doc(db, "user_stats", uid), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('lvl-text').innerText = data.level || 1;
                document.getElementById('xp-text').innerText = `${data.xp || 0} / 100`;
                document.getElementById('xp-fill').style.width = (data.xp || 0) + "%";
                
                // Görevleri listele
                renderQuests(data.quests || []);
            } else {
                // Veri yoksa oluştur
                setDoc(doc(db, "user_stats", uid), { level: 1, xp: 0, quests: [] });
            }
        });
    }

    function renderQuests(quests) {
        const list = document.getElementById('quest-list');
        list.innerHTML = quests.length === 0 ? "<p style='color:gray'>Henüz görev yok.</p>" : "";
        quests.forEach((q, index) => {
            const div = document.createElement('div');
            div.className = 'quest-item';
            div.innerHTML = `<span>${q}</span> <button onclick="completeQuest(${index})" class="btn-primary" style="padding:5px 10px; font-size:0.8rem;">TAMAMLA</button>`;
            list.appendChild(div);
        });
    }

    window.addQuest = async () => {
        const input = document.getElementById('quest-input');
        if (!input.value) return;
        const userRef = doc(db, "user_stats", userUID);
        const snap = await getDoc(userRef);
        let currentQuests = snap.data().quests || [];
        currentQuests.push(input.value);
        await updateDoc(userRef, { quests: currentQuests });
        input.value = "";
    };

    window.completeQuest = async (index) => {
        const userRef = doc(db, "user_stats", userUID);
        const snap = await getDoc(userRef);
        let data = snap.data();
        let currentQuests = data.quests;
        currentQuests.splice(index, 1); // Görevi sil

        let newXP = (data.xp || 0) + 20;
        let newLevel = data.level || 1;

        if (newXP >= 100) {
            newXP = 0;
            newLevel++;
            alert("LEVEL UP! Yeni Seviye: " + newLevel);
        }

        await updateDoc(userRef, { 
            quests: currentQuests,
            xp: newXP,
            level: newLevel
        });
    };
</script>
</body>
</html>
